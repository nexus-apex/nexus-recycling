{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Collection | NexusRecycling{% endblock %}
{% block page_title %}{% if editing %}Edit Collection{% else %}New Collection{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Collection Id</label>
        <input type="text" name="collection_id" value="{{ record.collection_id|default:'' }}">
      </div>
      <div class="form-group">
        <label>Area</label>
        <input type="text" name="area" value="{{ record.area|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Collection Type</label>
        <select name="collection_type">
          <option value="residential" {% if record.collection_type == 'residential' %}selected{% endif %}>Residential</option>
          <option value="commercial" {% if record.collection_type == 'commercial' %}selected{% endif %}>Commercial</option>
          <option value="industrial" {% if record.collection_type == 'industrial' %}selected{% endif %}>Industrial</option>
        </select>
      </div>
      <div class="form-group">
        <label>Driver</label>
        <input type="text" name="driver" value="{{ record.driver|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Vehicle</label>
        <input type="text" name="vehicle" value="{{ record.vehicle|default:'' }}">
      </div>
      <div class="form-group">
        <label>Scheduled Date</label>
        <input type="date" name="scheduled_date" value="{{ record.scheduled_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="scheduled" {% if record.status == 'scheduled' %}selected{% endif %}>Scheduled</option>
          <option value="in_progress" {% if record.status == 'in_progress' %}selected{% endif %}>In Progress</option>
          <option value="completed" {% if record.status == 'completed' %}selected{% endif %}>Completed</option>
          <option value="missed" {% if record.status == 'missed' %}selected{% endif %}>Missed</option>
        </select>
      </div>
      <div class="form-group">
        <label>Weight Kg</label>
        <input type="number" step="0.01" name="weight_kg" value="{{ record.weight_kg|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Collection</button>
      <a href="/collections/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
